name: Verify Rust release source
description: Run the shared source, policy, lint, and test gates required before publication

runs:
  using: composite
  steps:
    - name: Install pinned Rust toolchain
      shell: bash
      run: |
        rustup toolchain install 1.88.0 --profile minimal --component clippy --component rustfmt
        rustup default 1.88.0
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
    - if: runner.os == 'Linux'
      shell: bash
      run: cargo install cargo-audit --version 0.22.2 --locked
    - if: runner.os == 'Linux'
      shell: bash
      run: cargo audit
    - shell: bash
      run: sh scripts/check-version.sh
    - shell: bash
      run: sh scripts/check-repository.sh
    - shell: bash
      run: sh -n install.sh scripts/check-repository.sh scripts/check-version.sh
    - shell: bash
      run: cargo fmt --all -- --check
    - shell: bash
      run: cargo clippy --locked --all-targets --all-features -- -D warnings
    - shell: bash
      run: cargo test --locked --all-targets --all-features
    - shell: bash
      run: cargo test --locked --doc
