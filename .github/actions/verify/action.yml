name: Verify Rust release source
description: Run the shared source, policy, lint, and test gates required before publication

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0
      with:
        toolchain: 1.88.0
        components: clippy, rustfmt
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
    - if: runner.os == 'Linux'
      uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
      with:
        token: ${{ github.token }}
    - shell: bash
      run: sh scripts/check-version.sh
    - shell: bash
      run: sh scripts/check-repository.sh
    - shell: bash
      run: sh -n install.sh scripts/check-repository.sh scripts/check-version.sh
    - shell: bash
      run: cargo fmt --all -- --check
    - shell: bash
      run: cargo clippy --locked --all-targets --all-features -- -D warnings
    - shell: bash
      run: cargo test --locked --all-targets --all-features
    - shell: bash
      run: cargo test --locked --doc
